<head>
  <meta charset="UTF-8">

  <meta property="og:title" content="Running from Camera in Japan">
  <meta property="og:description" content="セルフタイマー2秒でシャッターを切り、出来るだけ遠くへ逃げる。日本と世界各地で撮り続けた写真ポートフォリオ。">
  <meta property="og:url" content="https://kokorahen.github.io/running-from-camera/">
  <meta property="og:image" content="https://kokorahen.github.io/running-from-camera/images/0237_1.jpg">
  <meta property="og:locale" content="ja_JP">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Running from Camera in Japan">
  <meta name="twitter:description" content="セルフタイマー2秒でシャッターを切り、出来るだけ遠くへ逃げる。">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏃</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <h1 class="site-title">Running from Camera<span class="in-japan"> in Japan</span></h1>
    </div>
    <p class="site-rule">&#9654;&ensp;カメラのセルフタイマーを２秒にセットして出来るだけ遠くへ逃げる</p>
  </header>

  <main>
    <div id="grid" class="photo-grid"></div>
    <div id="loading" class="loading">Loading...</div>
  </main>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true">
    <div class="lightbox-topbar">
      <span id="lightboxCounter" class="lightbox-counter"></span>
      <button class="lightbox-close" id="lightboxClose" aria-label="Close">&times;</button>
    </div>
    <button class="lightbox-nav prev" id="lightboxPrev" aria-label="Previous">&#8592;</button>
    <button class="lightbox-nav next" id="lightboxNext" aria-label="Next">&#8594;</button>
    <div class="lightbox-content">
      <img id="lightboxImg" src="" alt="">
      <div class="lightbox-meta">
        <span id="lightboxNumber"></span>
        <span id="lightboxLocation"></span>
        <span id="lightboxDate"></span>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>&#169; runorerun &mdash; All photos taken in Japan</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
